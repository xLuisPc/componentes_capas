version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-sistema-clientes
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sistema_clientes
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql_data:
